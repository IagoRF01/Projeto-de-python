<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    Avaliação de Trabalho
</title>

<link
    rel="stylesheet"
    href="{{ url_for(
        'static',
        filename='css/avaliacao.css'
    ) }}"
>

</head>

<body>

<div class="container">

    <h1>
        Avaliação do Trabalho
    </h1>

    <form
        action="/avaliacao/{{ trabalho.id }}"
        method="POST"
    >

        <label>
            Originalidade
        </label>

        <input
            type="number"
            name="originalidade"
            min="0"
            max="10"
            step="0.1"
            required
        >

        <label>
            Clareza
        </label>

        <input
            type="number"
            name="clareza"
            min="0"
            max="10"
            step="0.1"
            required
        >

        <label>
            Metodologia
        </label>

        <input
            type="number"
            name="metodologia"
            min="0"
            max="10"
            step="0.1"
            required
        >

        <label>
            Relevância
        </label>

        <input
            type="number"
            name="relevancia"
            min="0"
            max="10"
            step="0.1"
            required
        >

        <label>
            Organização
        </label>

        <input
            type="number"
            name="organizacao"
            min="0"
            max="10"
            step="0.1"
            required
        >

        <label>
            Comentário Geral
        </label>

        <textarea
            name="comentario"
            rows="6"
        ></textarea>

        <button type="submit">
            Salvar Avaliação
        </button>

    </form>

</div>

</body>
</html>
