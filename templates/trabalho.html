{% extends "base.html" %}

{% block title %}Trabalho{% endblock %}

{% block content %}

<div class="header">
  <h1>{{ trabalho.titulo }}</h1>
  <p>Detalhes do trabalho</p>
</div>

<div style="background:white; padding:20px; border-radius:12px; max-width:600px; margin:auto;">

  <p><strong>Resumo:</strong></p>
  <p>{{ trabalho.resumo }}</p>

  <p><strong>Status:</strong> {{ trabalho.status }}</p>

  <p><strong>Autor:</strong> {{ trabalho.aluno_id }}</p>

</div>

{% endblock %}
